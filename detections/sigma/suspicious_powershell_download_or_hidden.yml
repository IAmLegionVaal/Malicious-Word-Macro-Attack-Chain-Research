title: Suspicious PowerShell Download or Hidden Execution
id: 781ca462-03f4-4bf2-86ed-655ba3a08067
status: experimental
description: Detects PowerShell command lines containing combinations commonly associated with hidden execution, download cradles, or staged script execution.
author: Dewald Pretorius
date: 2026-06-30
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
  - https://attack.mitre.org/techniques/T1564/003/
logsource:
  category: process_creation
  product: windows
detection:
  image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  suspicious_terms:
    CommandLine|contains:
      - 'DownloadString'
      - 'Invoke-WebRequest'
      - 'System.Net.WebClient'
      - 'FromBase64String'
      - 'Invoke-Expression'
      - 'powercat'
  stealth_terms:
    CommandLine|contains:
      - '-WindowStyle Hidden'
      - '-w hidden'
      - '-EncodedCommand'
      - ' -enc '
      - '-ExecutionPolicy Bypass'
  condition: image and (suspicious_terms or stealth_terms)
falsepositives:
  - Administrative scripts and software deployment workflows
level: medium
tags:
  - attack.execution
  - attack.t1059.001
  - attack.command-and-control
  - attack.t1105
  - attack.defense-evasion
  - attack.t1564.003
