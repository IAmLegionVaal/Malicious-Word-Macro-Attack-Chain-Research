title: Microsoft Office Application Spawns Suspicious Child Process
id: ec922f1e-1865-4cad-96e1-4ca915228bef
status: experimental
description: Detects Office applications spawning command interpreters or common living-off-the-land binaries.
author: Dewald Pretorius
date: 2026-06-30
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://learn.microsoft.com/en-us/defender-endpoint/attack-surface-reduction-rules-reference
logsource:
  category: process_creation
  product: windows
detection:
  parent:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
      - '\OUTLOOK.EXE'
      - '\MSACCESS.EXE'
      - '\ONENOTE.EXE'
  child:
    Image|endswith:
      - '\cmd.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\installutil.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\curl.exe'
  condition: parent and child
falsepositives:
  - Rare approved Office automation or document-management integrations
level: high
tags:
  - attack.execution
  - attack.t1059
  - attack.t1218
